<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manchester NUC Monitor</title>
  <script src="https://unpkg.com/mqtt@5.15.1/dist/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e0e0e0; min-height: 100vh; padding: 32px 20px; }
    h1 { font-size: 1.1em; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #4fc3f7; text-align: center; margin-bottom: 32px; }
    .room { margin-bottom: 40px; }
    .room-title { font-size: 0.78em; letter-spacing: 2px; text-transform: uppercase; color: #4fc3f7; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #21262d; }
    .cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px 24px; min-width: 150px; text-align: center; }
    .card .name { font-size: 0.75em; letter-spacing: 1px; text-transform: uppercase; color: #8b949e; margin-bottom: 8px; }
    .card .temp { font-size: 2.2em; font-weight: 700; color: #4fc3f7; }
    .card .temp.warm { color: #ffa726; }
    .card .temp.hot  { color: #ef5350; }
    .chart-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; }
    .legend { display: flex; gap: 16px; margin-bottom: 10px; font-size: 0.72em; color: #8b949e; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend .dot { width: 8px; height: 8px; border-radius: 2px; }
    .status-bar { text-align: center; font-size: 0.72em; margin-bottom: 24px; }
    .status-bar.ok  { color: #1d9e75; }
    .status-bar.err { color: #ef5350; }
    .status-bar.connecting { color: #ffa726; }
  </style>
</head>
<body>
  <h1>Manchester NUC Temperature Monitor</h1>
  <div class="status-bar connecting" id="status">Connecting...</div>

  <div id="rooms"></div>

  <script>
    const AIO_USER = 'NekoHealth';
    const AIO_KEY  = 'aio_IBkQ10zVoK804P7M41nqUZS3oZMy';
    const ROOMS    = ['manchester-room1', 'manchester-room2', 'manchester-room3'];
    const NUCS     = ['spectrum', 'echo', 'windows'];
    const COLORS   = { spectrum: '#4fc3f7', echo: '#ffa726', windows: '#81c784' };
    const MAX_PTS  = 2880;

    // State per room
    const state = {};
    const charts = {};

    ROOMS.forEach(room => {
      state[room] = {
        spectrum: { val: null, log: [] },
        echo:     { val: null, log: [] },
        windows:  { val: null, log: [] }
      };
    });

    // Build DOM
    const container = document.getElementById('rooms');
    ROOMS.forEach((room, i) => {
      container.innerHTML += `
        <div class="room" id="room-${i}">
          <div class="room-title">Scan Room ${i + 1}</div>
          <div class="cards">
            <div class="card"><div class="name">Spectrum NUC</div><div class="temp" id="${room}-spectrum">--</div></div>
            <div class="card"><div class="name">Echo NUC</div><div class="temp" id="${room}-echo">--</div></div>
            <div class="card"><div class="name">Windows NUC</div><div class="temp" id="${room}-windows">--</div></div>
          </div>
          <div class="chart-box">
            <div class="legend">
              <span><span class="dot" style="background:#4fc3f7"></span>Spectrum</span>
              <span><span class="dot" style="background:#ffa726"></span>Echo</span>
              <span><span class="dot" style="background:#81c784"></span>Windows</span>
            </div>
            <div style="position:relative;width:100%;height:200px;">
              <canvas id="chart-${room}"></canvas>
            </div>
          </div>
        </div>`;
    });

    function colorClass(t) {
      if (t >= 55) return 'temp hot';
      if (t >= 45) return 'temp warm';
      return 'temp';
    }

    function updateCard(room, nuc, val) {
      const el = document.getElementById(room + '-' + nuc);
      if (!el) return;
      el.textContent = val.toFixed(1) + ' °C';
      el.className = colorClass(val);
    }

    function getOrCreateChart(room) {
      if (charts[room]) return charts[room];
      const ctx = document.getElementById('chart-' + room);
      if (!ctx) return null;
      charts[room] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [
            { label: 'Spectrum', data: [], borderColor: '#4fc3f7', backgroundColor: 'rgba(79,195,247,0.06)', borderWidth: 2, pointRadius: 1, tension: 0.3, spanGaps: true },
            { label: 'Echo',     data: [], borderColor: '#ffa726', backgroundColor: 'rgba(255,167,38,0.06)',  borderWidth: 2, pointRadius: 1, tension: 0.3, borderDash: [5,3], spanGaps: true },
            { label: 'Windows',  data: [], borderColor: '#81c784', backgroundColor: 'rgba(129,199,132,0.06)', borderWidth: 2, pointRadius: 1, tension: 0.3, borderDash: [2,3], spanGaps: true }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#21262d' } },
            y: { ticks: { color: '#8b949e', font: { size: 10 }, callback: v => v.toFixed(0) + '°' }, grid: { color: '#21262d' }, min: 20, suggestedMax: 70 }
          }
        }
      });
      return charts[room];
    }

    function refreshChart(room) {
      const chart = getOrCreateChart(room);
      if (!chart) return;
      const sLog = state[room].spectrum.log;
      const eLog = state[room].echo.log;
      const wLog = state[room].windows.log;
      const allTs = [...new Set([...sLog.map(p=>p.ts), ...eLog.map(p=>p.ts), ...wLog.map(p=>p.ts)])].sort();
      const tsMap = ts => {
        const d = new Date(ts);
        return d.toLocaleTimeString();
      };
      const findVal = (log, ts) => { const p = log.find(p => p.ts === ts); return p ? p.val : null; };
      chart.data.labels = allTs.map(tsMap);
      chart.data.datasets[0].data = allTs.map(ts => findVal(sLog, ts));
      chart.data.datasets[1].data = allTs.map(ts => findVal(eLog, ts));
      chart.data.datasets[2].data = allTs.map(ts => findVal(wLog, ts));
      chart.update('none');
    }

    function pushReading(room, nuc, val, ts) {
      const log = state[room][nuc].log;
      log.push({ ts, val });
      if (log.length > MAX_PTS) log.shift();
      state[room][nuc].val = val;
      updateCard(room, nuc, val);
      refreshChart(room);
    }

    // MQTT
    const client = mqtt.connect('wss://io.adafruit.com:443/mqtt', {
      username: AIO_USER,
      password: AIO_KEY,
      reconnectPeriod: 5000,
      clientId: 'dashboard_' + Math.random().toString(16).substr(2, 8)
    });

    client.on('connect', () => {
      document.getElementById('status').textContent = 'Connected — waiting for data';
      document.getElementById('status').className = 'status-bar ok';
      ROOMS.forEach(room => {
        NUCS.forEach(nuc => {
          client.subscribe(AIO_USER + '/feeds/' + room + '.' + nuc, { qos: 0 });
        });
      });
    });

    client.on('error', e => {
      document.getElementById('status').textContent = 'MQTT error: ' + e.message;
      document.getElementById('status').className = 'status-bar err';
    });

    client.on('offline', () => {
      document.getElementById('status').textContent = 'Offline - reconnecting...';
      document.getElementById('status').className = 'status-bar connecting';
    });

    client.on('message', (topic, message) => {
      const val = parseFloat(message.toString());
      if (isNaN(val) || val < -100) return;
      // Topic: NekoHealth/feeds/manchester-room1.spectrum
      const parts = topic.split('/feeds/');
      if (parts.length < 2) return;
      const feedParts = parts[1].split('.');
      if (feedParts.length < 2) return;
      const room = feedParts[0];
      const nuc  = feedParts[1];
      if (!state[room] || !state[room][nuc]) return;
      pushReading(room, nuc, val, Date.now());
      document.getElementById('status').textContent = 'Last update: ' + new Date().toLocaleTimeString();
      document.getElementById('status').className = 'status-bar ok';
    });

    // Load history from Adafruit IO REST API
    async function loadHistory(room, nuc) {
      try {
        const url = `https://io.adafruit.com/api/v2/${AIO_USER}/feeds/${room}.${nuc}/data?limit=200&order=asc`;
        const res = await fetch(url, { headers: { 'X-AIO-Key': AIO_KEY } });
        if (!res.ok) return;
        const data = await res.json();
        data.forEach(pt => {
          const val = parseFloat(pt.value);
          const ts  = new Date(pt.created_at).getTime();
          if (!isNaN(val) && val > -100) {
            state[room][nuc].log.push({ ts, val });
          }
        });
        if (state[room][nuc].log.length) {
          const last = state[room][nuc].log[state[room][nuc].log.length - 1];
          state[room][nuc].val = last.val;
          updateCard(room, nuc, last.val);
        }
        refreshChart(room);
      } catch(e) {}
    }

    // Load all history on start
    Promise.all(ROOMS.flatMap(room => NUCS.map(nuc => loadHistory(room, nuc))));
  </script>
</body>
</html>
